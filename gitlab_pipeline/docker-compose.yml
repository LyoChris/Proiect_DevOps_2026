services:
  db:
    image: postgres:15-alpine
    container_name: tutor-db
    environment:
      POSTGRES_DB: adaptive_tutor
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d adaptive_tutor"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ${APP_IMAGE}
    container_name: tutor-backend
    ports:
      - "8067:8067"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SERVER_PORT=8067
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/adaptive_tutor
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=password
      - JWT_SECRET=${JWT_SECRET}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_FROM=${MAIL_FROM}

volumes:
  postgres_data:
