---
- name: Common configs for VMs
  hosts: all
  become: true

  tasks:
    - name: Stop firewalld
      service:
        name: firewalld
        state: stopped
        enabled: false

    - name: Set time zone
      timezone:
        name: Europe/Bucharest

    - name: Copy Root CA
      copy:
        src: ./cert/ca.crt # aici am copiat certificatul din /usr/share/easy-rsa/3/pki/ca.crt in ./cert/ca.crt inainte de a rula playbook-ul
        dest: /etc/pki/ca-trust/source/anchors/
        owner: root
        group: root
        mode: '0744'

    - name: Update CA's
      command: update-ca-trust

    - name: PermitRootLogin prohibit-password
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin prohibit-password'
        backup: yes

    - name: no PasswordAuthentication for ssh
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
        backup: yes

    - name: Create banner file on both machines
