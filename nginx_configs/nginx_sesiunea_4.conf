# For more information on configuration, see:
#   * Official English Documentation: http://nginx.org/en/docs/
#   * Official Russian Documentation: http://nginx.org/ru/docs/

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;

# Load dynamic modules. See /usr/share/doc/nginx/README.dynamic.
include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 4096;

    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    # Load modular configuration files from the /etc/nginx/conf.d directory.
    # See http://nginx.org/en/docs/ngx_core_module.html#include
    # for more information.
    include /etc/nginx/conf.d/*.conf;

    upstream springboot_backend {
     	server springboot1:8080;
        server springboot2:8080;
    }

    server {
    	listen 80;
    	server_name app.fiipractic.lan;

    	return 301 https://$host$request_uri;
    }

    server {

    	listen 443 ssl;

    	server_name app.fiipractic.lan;

    	root /var/www/example;

    	index index.html;

    	ssl_certificate "/usr/share/easy-rsa/3/pki/issued/app.crt";

    	ssl_certificate_key "/usr/share/easy-rsa/3/pki/private/app.key";

    	location /spring1 {
    			proxy_pass http://springboot1:8080/;
    			proxy_http_version 1.1;

    			proxy_set_header Host $host;
    			proxy_set_header X-Real-IP $remote_addr;
    			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    			proxy_set_header X-Forwarded-Proto $scheme;
	}

	location /spring2 {
    		proxy_pass http://springboot2:8080/;
    		proxy_http_version 1.1;

    		proxy_set_header Host $host;
    		proxy_set_header X-Real-IP $remote_addr;
    		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    		proxy_set_header X-Forwarded-Proto $scheme;
	}

	location / {
    		proxy_pass http://springboot_backend;
    		proxy_http_version 1.1;

    		proxy_set_header Host $host;
    		proxy_set_header X-Real-IP $remote_addr;
    		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    		proxy_set_header X-Forwarded-Proto $scheme;
	}

	location /netdata/ {
		proxy_pass http://127.0.0.1:19999/;
		proxy_http_version 1.1;

		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;

		proxy_intercept_errors on;
		error_page 502 503 504 =503 /maintenance.html;
	}

	location = /maintenance.html {
    		internal;
	}

    }

    server {
    	listen 80;
    	server_name netdata.fiipractic.lan;

    	return 301 https://$host$request_uri;
    }

    server {
    	listen 443 ssl;
    	server_name netdata.fiipractic.lan;

   	ssl_certificate "/usr/share/easy-rsa/3/pki/issued/app.crt";
    	ssl_certificate_key "/usr/share/easy-rsa/3/pki/private/app.key";

	auth_basic "Netdata Login";
	auth_basic_user_file /etc/nginx/.htpasswd;

    	location / {
        	proxy_pass http://127.0.0.1:19999/;
        	proxy_http_version 1.1;

        	proxy_set_header Host $host;
        	proxy_set_header X-Real-IP $remote_addr;
        	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        	proxy_set_header X-Forwarded-Proto $scheme;

        	proxy_intercept_errors on;
        	error_page 502 503 504 =503 /maintenance.html;
    	}

    	location = /maintenance.html {
        	root /var/www/example;
        	internal;
    	}
   }


